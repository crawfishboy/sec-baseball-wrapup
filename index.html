<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC Weekly</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:#fff;
}

header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #222;
}

h1{ margin:0; font-size:28px; }

.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.section{
  background:#121a2b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #1f2a44;
}

h2{
  margin-top:0;
  font-size:18px;
  border-bottom:1px solid #26324d;
  padding-bottom:6px;
  color:#7cc4ff;
}

.item{
  padding:5px 0;
  border-bottom:1px solid #1f2a44;
}

.item:last-child{
  border-bottom:none;
}
</style>
</head>

<body>

<header>
  <h1>🏈 SEC Weekly</h1>
</header>

<div class="container">

  <div class="section">
    <h2>This Week’s Games</h2>
    <div id="games">Loading...</div>
  </div>

  <div class="section">
    <h2>Results</h2>
    <div id="results">Loading...</div>
  </div>

  <div class="section">
    <h2>Next Week’s Games</h2>
    <div id="next">Loading...</div>
  </div>

  <div class="section">
    <h2>Standings</h2>
    <div id="standings">Loading...</div>
  </div>

</div>

<script>

const SHEET_URL = "PASTE_YOUR_GOOGLE_SHEET_CSV_URL_HERE";

async function load(){
  const res = await fetch(SHEET_URL);
  const text = await res.text();

  const rows = text.trim().split("\n").slice(1);

  let data = {
    games: [],
    results: [],
    next: [],
    standings: []
  };

  rows.forEach(r=>{
    const [section,value] = r.split(",");
    if(data[section]) data[section].push(value);
  });

  document.getElementById("games").innerHTML =
    data.games.map(x=>`<div class="item">${x}</div>`).join("");

  document.getElementById("results").innerHTML =
    data.results.map(x=>`<div class="item">${x}</div>`).join("");

  document.getElementById("next").innerHTML =
    data.next.map(x=>`<div class="item">${x}</div>`).join("");

  document.getElementById("standings").innerHTML =
    data.standings.map(x=>`<div class="item">${x}</div>`).join("");
}

load();

</script>

</body>
</html>
