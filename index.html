<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC Weekly</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#1b2230;
  color:#e6edf3;
}

header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #2b3446;
  background:#202a3a;
}

h1{
  margin:0;
  font-size:28px;
  color:#f2f6fb;
}

.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.section{
  background:#232c3d;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #2f3a4f;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
}

h2{
  margin-top:0;
  font-size:18px;
  border-bottom:1px solid #33415a;
  padding-bottom:6px;
  color:#9cc9ff;
  font-weight:600;
}

.item{
  padding:10px 12px;
  background:#2a3548;
  border:1px solid #34425a;
  border-radius:8px;
  margin:6px 0;
  color:#d6dee8;
}

/* standings table */
.standings-table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

.standings-table th,
.standings-table td{
  padding:10px;
  border:1px solid #2c364a;
  text-align:left;
}

.standings-table th{
  background:#2a3548;
  color:#9cc9ff;
}

.standings-table tr:nth-child(even){
  background:#232c3d;
}

.standings-table tr:nth-child(odd){
  background:#202a3a;
}

.error{
  color:#ff8a8a;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<header>
  <h1>⚾ SEC Baseball Weekly Wrap Up</h1>
</header>

<div class="container">

  <div class="section">
    <h2>This Week’s Games</h2>
    <div id="games">Loading...</div>
  </div>

  <div class="section">
    <h2>Results</h2>
    <div id="results">Loading...</div>
  </div>

  <div class="section">
    <h2>Next Week’s Games</h2>
    <div id="next">Loading...</div>
  </div>

  <div class="section">
    <h2>Standings</h2>
    <div id="standings">Loading...</div>
  </div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

function render(list){
  return list.map(x => `<div class="item">${x}</div>`).join("");
}

async function load(){
  try {
    const res = await fetch(SHEET_URL + "&cachebust=" + new Date().getTime());
    const csvText = await res.text();

    const parsed = Papa.parse(csvText.trim(), {
      skipEmptyLines: true
    });

    const rows = parsed.data.slice(1);

    let data = {
      games: [],
      results: [],
      next: []
    };

    let standings = [];

    rows.forEach(r => {
      const section = (r[0] || "").trim().toLowerCase();

      // clean value for non-standings sections
      const value = r.slice(1).filter(v => v && v.toString().trim() !== "").join(" ").trim();

      if (section === "standings") {
        const cols = r.slice(1);

        if (cols[0]) {
          standings.push({
            team: cols[0],
            wins: cols[1],
            losses: cols[2],
            pct: cols[3],
            gb: cols[4]
          });
        }
      }
      else if (data[section] && value !== "") {
        data[section].push(value);
      }
    });

    document.getElementById("games").innerHTML = render(data.games);
    document.getElementById("results").innerHTML = render(data.results);
    document.getElementById("next").innerHTML = render(data.next);

    document.getElementById("standings").innerHTML = `
      <table class="standings-table">
        <thead>
          <tr>
            <th>RK</th>
            <th>TEAM</th>
            <th>W</th>
            <th>L</th>
            <th>PCT</th>
            <th>GB</th>
          </tr>
        </thead>
        <tbody>
          ${standings.map((t, i) => `
            <tr>
              <td>${i + 1}</td>
              <td>${t.team}</td>
              <td>${t.wins}</td>
              <td>${t.losses}</td>
              <td>${t.pct}</td>
              <td>${t.gb}</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    `;

  } catch (err) {
    console.error(err);

    document.getElementById("games").innerHTML =
      `<div class="error">Failed to load data</div>`;
  }
}

load();

</script>

</body>
</html>
