<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEC Weekly</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0b1220;
  color:#fff;
}

header{
  padding:20px;
  text-align:center;
  border-bottom:1px solid #222;
}

h1{ margin:0; font-size:28px; }

.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.section{
  background:#121a2b;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #1f2a44;
}

h2{
  margin-top:0;
  font-size:18px;
  border-bottom:1px solid #26324d;
  padding-bottom:6px;
  color:#7cc4ff;
}

.item{
  padding:6px 0;
  border-bottom:1px solid #1f2a44;
}

.item:last-child{
  border-bottom:none;
}

.error{
  color:#ff6b6b;
}
</style>

<!-- PapaParse for reliable Google Sheets CSV parsing -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

</head>

<body>

<header>
  <h1>⚾ SEC Baseball Weekly Wrap Up</h1>
</header>

<div class="container">

  <div class="section">
    <h2>This Week’s Games</h2>
    <div id="games">Loading...</div>
  </div>

  <div class="section">
    <h2>Results</h2>
    <div id="results">Loading...</div>
  </div>

  <div class="section">
    <h2>Next Week’s Games</h2>
    <div id="next">Loading...</div>
  </div>

  <div class="section">
    <h2>Standings</h2>
    <div id="standings">Loading...</div>
  </div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

function render(list){
  return list.map(x => `<div class="item">${x}</div>`).join("");
}

async function load(){
  try {
    const res = await fetch(SHEET_URL + "&cachebust=" + new Date().getTime());
    const csvText = await res.text();

    const parsed = Papa.parse(csvText.trim(), {
      skipEmptyLines: true
    });

    const rows = parsed.data.slice(1); // remove header

    let data = {
      games: [],
      results: [],
      next: [],
      standings: []
    };

    rows.forEach(r => {
      const section = (r[0] || "").trim();
      const value = (r.slice(1).join(",") || "").trim();

      if (data[section]) {
        data[section].push(value);
      }
    });

    document.getElementById("games").innerHTML = render(data.games);
    document.getElementById("results").innerHTML = render(data.results);
    document.getElementById("next").innerHTML = render(data.next);
    document.getElementById("standings").innerHTML = render(data.standings);

  } catch (err) {
    console.error(err);

    document.getElementById("games").innerHTML =
      `<div class="error">Failed to load data</div>`;
    document.getElementById("results").innerHTML = "";
    document.getElementById("next").innerHTML = "";
    document.getElementById("standings").innerHTML = "";
  }
}

load();

</script>

</body>
</html>
