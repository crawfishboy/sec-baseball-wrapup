<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SEC Baseball Weekly Wrap Up</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body {
  margin: 0;
  background: #0f141c;
  font-family: Arial, sans-serif;
  color: #000;
}

/* ================= MAIN CARD ================= */
.sec-card {
  max-width: 900px;
  margin: 40px auto;
  background: #ffffff;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(0,0,0,0.25);
}

/* ================= TOP HEADER BAR ================= */
.sec-header-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #1f4e8c;
  color: #ffffff;
  text-transform: uppercase;
  font-weight: 700;
  text-align: center;
  padding: 16px 0;
  font-size: 16px;
  border-bottom: 2px solid #163a68;
}

.sec-header-bar div {
  border-right: 1px solid rgba(255,255,255,0.25);
}

.sec-header-bar div:last-child {
  border-right: none;
}

/* ================= SECTION BLOCKS ================= */
.sec-section {
  padding: 20px 24px;
  border-bottom: 1px solid #e5e5e5;
}

.sec-section:last-child {
  border-bottom: none;
}

.sec-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 14px;
  text-transform: uppercase;
  color: #1f4e8c;
}

/* ================= ROWS ================= */
.row {
  padding: 10px 0;
  border-bottom: 1px solid #e5e5e5;
  font-size: 16px;
}

.row:last-child {
  border-bottom: none;
}

/* ================= STANDINGS TABLE ================= */
.table {
  width: 100%;
  border-collapse: collapse;
  font-size: 16px;
}

.table th {
  background: #1f4e8c;
  color: #fff;
  padding: 10px;
  font-weight: 700;
  border-bottom: 2px solid #163a68;
}

.table td {
  padding: 10px;
  border-bottom: 1px solid #e5e5e5;
}

.table tr:last-child td {
  border-bottom: none;
}

/* Alignments */
.table th:nth-child(1),
.table td:nth-child(1),
.table th:nth-child(2),
.table td:nth-child(2) {
  text-align: left;
}

.table td:nth-child(n+3) {
  text-align: center;
  font-variant-numeric: tabular-nums;
}
</style>
</head>

<body>

<div class="sec-card">

  <div class="sec-header-bar">
    <div>Games</div>
    <div>Results</div>
    <div>Next Week</div>
    <div>Standings</div>
  </div>

  <div class="sec-section" id="games">
    <div class="sec-title">This Week’s Games</div>
    <div id="gamesData"></div>
  </div>

  <div class="sec-section" id="results">
    <div class="sec-title">Results</div>
    <div id="resultsData"></div>
  </div>

  <div class="sec-section" id="next">
    <div class="sec-title">Next Week</div>
    <div id="nextData"></div>
  </div>

  <div class="sec-section" id="standings">
    <div class="sec-title">Standings</div>
    <div id="standingsData"></div>
  </div>

</div>

<script>
/* ================= SHEETS ================= */
const BASE =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEETS = {
  current: BASE + "&gid=0",
  week1: BASE + "&gid=749848866",
  week2: BASE + "&gid=761086323",
  week3: BASE + "&gid=752709309",
  week4: BASE + "&gid=476878133",
  week5: BASE + "&gid=10532734"
};

const params = new URLSearchParams(window.location.search);
const currentWeek = params.get("week") || "current";
const SHEET_URL = SHEETS[currentWeek] || SHEETS.current;

/* ================= HELPERS ================= */
function row(text){
  return `<div class="row">${text}</div>`;
}

/* ================= LOAD DATA ================= */
async function load(){
  try{
    const res = await fetch(SHEET_URL + "&cache=" + Date.now());
    const csv = await res.text();
    const rows = Papa.parse(csv.trim()).data;

    let data = {games:[], results:[], next:[]};
    let standings = [];

    rows.forEach(r=>{
      const type = (r[0]||"").toLowerCase();

      if(type === "standings"){
        standings.push({
          team:r[1],
          wins:r[2],
          losses:r[3],
          pct:r[4],
          gb:r[5]
        });
        return;
      }

      if(data[type]){
        data[type].push(r.slice(1).join(" "));
      }
    });

    /* MAIN SECTIONS */
    document.getElementById("gamesData").innerHTML =
      data.games.map(row).join("");

    document.getElementById("resultsData").innerHTML =
      data.results.map(row).join("");

    document.getElementById("nextData").innerHTML =
      data.next.map(row).join("");

    /* STANDINGS */
    standings.sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));

    let lastPct = null;
    let rank = 0;
    let displayRank = 0;

    const ranked = standings.map((team, i) => {
      const pct = parseFloat(team.pct);

      if (pct !== lastPct) {
        rank = i + 1;
        displayRank = rank;
      }

      lastPct = pct;

      return {
        ...team,
        rank: (standings.filter(t => parseFloat(t.pct) === pct).length > 1)
      ? displayRank + " (tie)"
      : displayRank
      };
    });

    document.getElementById("standingsData").innerHTML = `
      <table class="table">
        <tr><th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr>
        ${ranked.map(t=>`
          <tr>
            <td>${t.rank}</td>
            <td>${t.team}</td>
            <td>${t.wins}</td>
            <td>${t.losses}</td>
            <td>${t.pct}</td>
            <td>${t.gb}</td>
          </tr>
        `).join("")}
      </table>
    `;

  } catch(err){
    console.error("Data load error:", err);
  }
}

/* INIT */
load();

/* AUTO REFRESH */
setInterval(() => {
  if (!document.hidden) load();
}, 60000);
</script>

</body>
</html>
