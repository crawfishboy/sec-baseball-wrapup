<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SEC Baseball Weekly Wrap Up</title>
<link rel="icon" href="/favicon.ico" />

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f141c;
  color:#e6edf3;
}

.container{
  max-width:1100px;
  margin:0 auto;
  padding:14px;
}

/* ================= NAV ================= */
.section-nav{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:10px 14px;
  background:#0c121d;
  border-bottom:1px solid #263143;
}

.nav-left{
  display:flex;
  gap:14px;
}

.nav-left a{
  color:#9fb3cc;
  text-decoration:none;
  font-size:13px;
}

.nav-left a:hover{
  color:#ffffff;
}

.nav-right{
  display:flex;
  align-items:center;
  gap:8px;
}

.nav-label{
  font-size:12px;
  color:#6f8198;
}

#weekSelect{
  background:#101826;
  color:#fff;
  border:1px solid #263143;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
}

/* ================= HERO ================= */
.hero{
  position:relative;
  height:260px;
  background:url('https://imgs.search.brave.com/hO_kKVjyICctIyWBwNPCZzV_uu9ArVWyMDB5vf3ufwM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90aHVt/YnMuZHJlYW1zdGlt/ZS5jb20vYi9jbG9z/ZXVwLXVwLWJhc2Vi/…') center/cover no-repeat;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content{
  position:relative;
  padding:24px;
}

.hero-featured{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}

.hero-card{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;
  padding:10px;
}

/* ================= PANELS ================= */
.panel-white{
  background:#fff;
  color:#111;
  border-radius:10px;
  padding:12px;
  margin-bottom:14px;
}

.panel-blue{
  background:#1f4e8c;
  color:#fff;
  border-radius:10px;
  padding:12px;
}

/* ================= TABLE ================= */
.table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.table th,
.table td{
  padding:8px;
  text-align:center;
}

/* LEFT ALIGN RK + TEAM */
.table th:nth-child(1),
.table td:nth-child(1),
.table th:nth-child(2),
.table td:nth-child(2){
  text-align:left;
}

/* RANK COLUMN */
.table th:nth-child(1),
.table td:nth-child(1){
  width:70px;
  min-width:70px;
  white-space:nowrap;
  padding-left:6px;
}

/* TEAM COLUMN */
.table td:nth-child(2){
  padding-left:8px;
}

/* NUMBERS */
.table td:nth-child(n+3){
  font-variant-numeric:tabular-nums;
}

/* ================= STANDINGS LIVE STYLE ================= */
.table tr{
  transition:all 0.15s ease;
}

.table tr:nth-child(even){
  background:rgba(255,255,255,0.04);
}

.table tr:hover{
  background:rgba(31, 78, 140, 0.25);
}

.table tr.first{
  background:rgba(0, 255, 136, 0.10);
  border-left:3px solid #00ff88;
  font-weight:700;
}

.table tr.playoff{
  background:rgba(255, 215, 0, 0.08);
  border-left:3px solid gold;
}

.clinch{
  display:inline-block;
  font-size:11px;
  margin-left:6px;
  padding:2px 6px;
  border-radius:10px;
  background:#ff3b3b;
  color:#fff;
  font-weight:700;
}

</style>
</head>

<body>

<!-- ================= NAV ================= -->
<div class="section-nav">

  <div class="nav-left">
    <a href="#games">This Week</a>
    <a href="#results">Results</a>
    <a href="#next">Next Week</a>
    <a href="#standings">Standings</a>
  </div>

  <div class="nav-right">
    <label class="nav-label">Week</label>
    <select id="weekSelect">
      <option value="current">Current</option>
      <option value="week1">Week 1</option>
      <option value="week2">Week 2</option>
      <option value="week3">Week 3</option>
      <option value="week4">Week 4</option>
      <option value="week5">Week 5</option>
    </select>
  </div>

</div>

<!-- ================= HERO ================= -->
<div class="hero">
  <div class="hero-content">
    <h2>SEC Baseball Weekly Wrap Up</h2>
    <p>Scores • Results • Next • Standings</p>
    <div class="hero-featured" id="featuredGames"></div>
  </div>
</div>

<div class="container">

  <div class="panel-white" id="games">
    <h3>This Week’s Games</h3>
    <div id="gamesData"></div>
  </div>

  <div class="panel-white" id="results">
    <h3>Results</h3>
    <div id="resultsData"></div>
  </div>

  <div class="panel-white" id="next">
    <h3>Next Week</h3>
    <div id="nextData"></div>
  </div>

  <div class="panel-blue" id="standings">
    <h3>Standings</h3>
    <div id="standingsData"></div>
  </div>

</div>

<script>

/* ================= WEEK SWITCH ================= */
const params = new URLSearchParams(window.location.search);
const currentWeek = params.get("week") || "current";

const weekSelect = document.getElementById("weekSelect");
weekSelect.value = currentWeek;

weekSelect.addEventListener("change", (e)=>{
  window.location.href = `?week=${e.target.value}`;
});

/* ================= SHEET ================= */
const BASE =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEET_URL = BASE + "&gid=0";

/* ================= LOAD ================= */
async function load(){

  const res = await fetch(SHEET_URL + "&cache=" + Date.now());
  const csv = await res.text();
  const rows = Papa.parse(csv.trim()).data;

  let data = {games:[], results:[], next:[]};
  let standings = [];
  let featured = [];

  rows.forEach(r=>{
    const type = (r[0]||"").toLowerCase();

    if(type === "featured"){
      featured.push({ match:r[1], meta:r[2] });
      return;
    }

    if(type === "standings"){
      standings.push({
        team:r[1],
        wins:r[2],
        losses:r[3],
        pct:r[4],
        gb:r[5]
      });
      return;
    }

    if(data[type]){
      data[type].push(r.slice(1).join(" "));
    }
  });

  /* FEATURED */
  document.getElementById("featuredGames").innerHTML =
    featured.map(f=>`
      <div class="hero-card">
        <b>${f.match}</b>
        <div style="font-size:12px;color:#cfe3ff;">${f.meta}</div>
      </div>
    `).join("");

  /* SECTIONS */
  document.getElementById("gamesData").innerHTML =
    data.games.map(r=>`<div>${r}</div>`).join("");

  document.getElementById("resultsData").innerHTML =
    data.results.map(r=>`<div>${r}</div>`).join("");

  document.getElementById("nextData").innerHTML =
    data.next.map(r=>`<div>${r}</div>`).join("");

  /* ================= STANDINGS ================= */
  standings.sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));

  let ranked = standings.map((t,i)=>({
    ...t,
    rank:i+1,
    clinched: parseInt(t.wins) >= 10
  }));

  document.getElementById("standingsData").innerHTML = `
    <table class="table">
      <tr>
        <th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th>
      </tr>

      ${ranked.map((t,i)=>{

        let cls = "";
        if(i === 0) cls = "first";
        else if(i < 4) cls = "playoff";

        return `
          <tr class="${cls}">
            <td>${t.rank}</td>
            <td>
              ${t.team}
              ${t.clinched ? `<span class="clinch">CLINCHED</span>` : ""}
            </td>
            <td>${t.wins}</td>
            <td>${t.losses}</td>
            <td>${t.pct}</td>
            <td>${t.gb}</td>
          </tr>
        `;
      }).join("")}
    </table>
  `;
}

load();

</script>

</body>
</html>
