<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link rel="icon" href="/favicon.ico" />
<title>SEC Baseball Weekly Wrap Up</title>

<style>
:root{
  --bg:#0f141c;
  --panel:#151c27;
  --panel2:#1c2432;
  --text:#e6edf3;
  --muted:#9fb3cc;
  --accent:#ff3b3b;
  --border:#263143;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ===== HEADER ===== */
.sticky-header{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}

.header-title{
  text-align:center;
  padding:14px 10px 6px;
}

.header-title h1{
  margin:0;
  font-size:22px;
}

.header-controls{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:8px;
  flex-wrap:wrap;
}

.header-controls a{
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
  font-size:13px;
}

.header-controls select{
  background:var(--panel2);
  color:var(--text);
  border:1px solid var(--border);
  padding:6px;
  border-radius:6px;
}

/* NAV */
.section-nav{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:var(--panel2);
  border-top:1px solid var(--border);
  flex-wrap:wrap;
}

.section-nav a{
  color:var(--muted);
  text-decoration:none;
  font-size:13px;
}

/* ===== ESPN FEED LAYOUT ===== */
.container{
  max-width:760px;
  margin:0 auto;
  padding:14px;
}

/* HERO */
.hero{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:14px;
  padding:16px;
  margin-bottom:14px;
}

.hero h2{
  margin:0 0 10px;
  font-size:16px;
  color:var(--accent);
}

/* SECTION HEADER */
.section-title{
  margin:18px 0 8px;
  font-size:13px;
  letter-spacing:1px;
  color:var(--muted);
  text-transform:uppercase;
}

/* STORY CARD (ESPN STYLE) */
.card{
  background:var(--panel);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
  margin-bottom:10px;
}

.card .title{
  font-weight:600;
  font-size:14px;
}

.card .meta{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}

/* FEATURED */
.featured{
  background:var(--panel2);
  border-left:4px solid var(--accent);
}

/* STANDINGS TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

th, td{
  border-bottom:1px solid var(--border);
  padding:8px;
  text-align:center;
}

th{
  color:var(--muted);
  font-weight:600;
}

.error{
  color:#ff6b6b;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="sticky-header">

  <div class="header-title">
    <h1>⚾ SEC Baseball Weekly Wrap Up</h1>
  </div>

  <div class="header-controls">
    <a href="?week=current">Current</a>
    <select onchange="location = this.value">
      <option value="">Past Weeks</option>
      <option value="?week=week1">Week 1</option>
      <option value="?week=week2">Week 2</option>
      <option value="?week=week3">Week 3</option>
      <option value="?week=week4">Week 4</option>
      <option value="?week=week5">Week 5</option>
    </select>
  </div>

  <div class="section-nav">
    <a href="#top">Top</a>
    <a href="#games">Games</a>
    <a href="#results">Results</a>
    <a href="#next">Next</a>
    <a href="#standings">Standings</a>
  </div>

</div>

<div class="container">

  <!-- HERO -->
  <div class="hero" id="top">
    <h2>🔥 Featured Matchups</h2>
    <div id="featuredData"></div>
  </div>

  <!-- GAMES -->
  <div id="games">
    <div class="section-title">This Week</div>
    <div id="gamesData"></div>
  </div>

  <!-- RESULTS -->
  <div id="results">
    <div class="section-title">Results</div>
    <div id="resultsData"></div>
  </div>

  <!-- NEXT -->
  <div id="next">
    <div class="section-title">Next Week</div>
    <div id="nextData"></div>
  </div>

  <!-- STANDINGS -->
  <div id="standings">
    <div class="section-title">Standings</div>
    <div id="standingsData"></div>
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const week = params.get("week") || "current";

const BASE =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEETS = {
  current: BASE + "&gid=0",
  week1: BASE + "&gid=749848866",
  week2: BASE + "&gid=761086323",
  week3: BASE + "&gid=752709309",
  week4: BASE + "&gid=476878133",
  week5: BASE + "&gid=10532734"
};

const SHEET_URL = SHEETS[week] || SHEETS["current"];

function card(text, type=""){
  return `
    <div class="card ${type}">
      <div class="title">${text}</div>
      <div class="meta">Thu–Sun</div>
    </div>
  `;
}

async function load(){
  try{
    const res = await fetch(SHEET_URL + "&cachebust=" + Date.now());
    const csvText = await res.text();

    const rows = Papa.parse(csvText.trim(), { skipEmptyLines:true }).data;

    let data = { games:[], results:[], next:[] };
    let standings = [];

    rows.forEach(r=>{
      const section = (r[0]||"").toLowerCase();

      if(section === "standings"){
        if(r[1]){
          standings.push({
            team:r[1],
            wins:r[2],
            losses:r[3],
            pct:r[4],
            gb:r[5]
          });
        }
        return;
      }

      if(data[section]){
        const value = r.slice(1).join(" ").trim();
        data[section].push(value);
      }
    });

    // FEATURED
    document.getElementById("featuredData").innerHTML =
      data.games.slice(0,2).map(g => card(g,"featured")).join("");

    // LISTS
    document.getElementById("gamesData").innerHTML =
      data.games.map(g=>card(g)).join("");

    document.getElementById("resultsData").innerHTML =
      data.results.map(g=>card(g)).join("");

    document.getElementById("nextData").innerHTML =
      data.next.map(g=>card(g)).join("");

    // STANDINGS
    standings.sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));

    document.getElementById("standingsData").innerHTML = `
      <table>
        <tr><th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr>
        ${standings.map((t,i)=>`
          <tr>
            <td>${i+1}</td>
            <td>${t.team}</td>
            <td>${t.wins}</td>
            <td>${t.losses}</td>
            <td>${t.pct}</td>
            <td>${t.gb}</td>
          </tr>
        `).join("")}
      </table>
    `;

  }catch(err){
    document.getElementById("gamesData").innerHTML =
      `<div class="error">Failed to load data</div>`;
  }
}

load();

</script>

</body>
</html>
