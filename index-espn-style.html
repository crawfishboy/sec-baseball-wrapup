<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/favicon.ico" />

<title>SEC Baseball Weekly Wrap Up</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#1b2230;
  color:#e6edf3;
}

/* ===== STICKY HEADER ===== */
.sticky-header{
  position:sticky;
  top:0;
  z-index:1000;
  background:#202a3a;
  border-bottom:1px solid #2b3446;
}

.header-title{
  text-align:center;
  padding:12px 10px 5px;
}

.header-title h1{
  margin:0;
  font-size:26px;
}

.header-controls{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:8px;
  flex-wrap:wrap;
}

.header-controls a{
  color:#9cc9ff;
  text-decoration:none;
  font-weight:600;
}

.section-nav{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:10px;
  background:#141b27;
  border-top:1px solid #2b3446;
  flex-wrap:wrap;
}

.section-nav a{
  color:#cfe3ff;
  text-decoration:none;
  padding:6px 12px;
  border-radius:8px;
  background:#232c3d;
  border:1px solid #2f3a4f;
  font-size:14px;
}

.section-nav a:hover{
  background:#2f3a4f;
}

/* ===== LAYOUT ===== */
.container{
  max-width:900px;
  margin:20px auto;
  padding:10px;
}

.section{
  background:#232c3d;
  padding:15px;
  margin-bottom:15px;
  border-radius:12px;
  border:1px solid #2f3a4f;
}

h2{
  margin-top:0;
  font-size:18px;
  border-bottom:1px solid #33415a;
  padding-bottom:6px;
  color:#9cc9ff;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

@media(max-width:700px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* ===== FEATURED ===== */
.featured-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.featured-card{
  background:#1f2a3a;
  border:1px solid #2f3a4f;
  border-radius:12px;
  padding:14px;
  text-align:center;
}

.featured-card .teams{
  font-size:16px;
  font-weight:600;
}

.featured-card .meta{
  font-size:12px;
  color:#9cc9ff;
  margin-top:6px;
}

/* ===== GAME CARDS ===== */
.game-card{
  background:#2a3548;
  border:1px solid #34425a;
  border-radius:10px;
  padding:12px;
  margin:8px 0;
}

.game-card .teams{
  font-weight:600;
}

.game-card .meta{
  font-size:12px;
  color:#9cc9ff;
}

/* ===== RESULTS ===== */
.result-card{
  background:#2a3548;
  border:1px solid #34425a;
  border-left:4px solid #4caf50;
  border-radius:10px;
  padding:12px;
  margin:8px 0;
}

/* ===== STANDINGS ===== */
.standings-table{
  width:100%;
  border-collapse:collapse;
}

.standings-table th,
.standings-table td{
  padding:10px;
  border:1px solid #2c364a;
}

.standings-table th{
  background:#2a3548;
  color:#9cc9ff;
}

.error{
  color:#ff8a8a;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<!-- HEADER -->
<div class="sticky-header">

  <div class="header-title">
    <h1>⚾ SEC Baseball Weekly Wrap Up</h1>
  </div>

  <div class="header-controls">
    <a href="?week=current">Current</a>

    <select onchange="location = this.value">
      <option value="">Past Weeks</option>
      <option value="?week=week1">Week 1</option>
      <option value="?week=week2">Week 2</option>
      <option value="?week=week3">Week 3</option>
      <option value="?week=week4">Week 4</option>
      <option value="?week=week5">Week 5</option>
    </select>
  </div>

  <div class="section-nav">
    <a href="#featured">Top</a>
    <a href="#games">Games</a>
    <a href="#results">Results</a>
    <a href="#next">Next</a>
    <a href="#standings">Standings</a>
  </div>

</div>

<div class="container">

  <!-- FEATURED -->
  <div class="section" id="featured">
    <h2>🔥 Top Matchups This Week</h2>
    <div id="featuredData" class="featured-grid"></div>
  </div>

  <!-- GRID 1 -->
  <div class="grid">

    <div class="section" id="games">
      <h2>This Week’s Games</h2>
      <div id="gamesData">Loading...</div>
    </div>

    <div class="section" id="results">
      <h2>Results</h2>
      <div id="resultsData">Loading...</div>
    </div>

  </div>

  <!-- GRID 2 -->
  <div class="grid">

    <div class="section" id="next">
      <h2>Next Week</h2>
      <div id="nextData">Loading...</div>
    </div>

    <div class="section" id="standings">
      <h2>Standings</h2>
      <div id="standingsData">Loading...</div>
    </div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const week = params.get("week") || "current";

const BASE =
  "https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEETS = {
  current: BASE + "&gid=0",
  week1: BASE + "&gid=749848866",
  week2: BASE + "&gid=761086323",
  week3: BASE + "&gid=752709309",
  week4: BASE + "&gid=476878133",
  week5: BASE + "&gid=10532734"
};

const SHEET_URL = SHEETS[week] || SHEETS["current"];

function render(list, type){
  return list.map(x => {
    if (x === "__BLANK__") return `<div style="height:10px;"></div>`;

    if(type === "results"){
      return `<div class="result-card">${x}</div>`;
    }

    return `
      <div class="game-card">
        <div class="teams">${x}</div>
        <div class="meta">Thu–Sun</div>
      </div>
    `;
  }).join("");
}

async function load(){
  try {
    const res = await fetch(SHEET_URL + "&cachebust=" + new Date().getTime());
    const csvText = await res.text();

    const rows = Papa.parse(csvText.trim(), { skipEmptyLines:true }).data;

    let data = { games:[], results:[], next:[] };
    let standings = [];

    rows.forEach(r => {
      const section = (r[0] || "").toLowerCase();

      if(section === "standings"){
        if(r[1]){
          standings.push({
            team:r[1], wins:r[2], losses:r[3],
            pct:r[4], gb:r[5]
          });
        }
        return;
      }

      if(data[section]){
        const value = r.slice(1).join(" ").trim();
        data[section].push(value || "__BLANK__");
      }
    });

    // FEATURED
    const featured = data.games.slice(0,2);
    document.getElementById("featuredData").innerHTML =
      featured.map(g => `
        <div class="featured-card">
          <div class="teams">${g}</div>
          <div class="meta">Thu–Sun</div>
        </div>
      `).join("");

    // MAIN
    document.getElementById("gamesData").innerHTML = render(data.games,"games");
    document.getElementById("resultsData").innerHTML = render(data.results,"results");
    document.getElementById("nextData").innerHTML = render(data.next,"next");

    // STANDINGS
    standings.sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));

    let output="";
    standings.forEach((t,i)=>{
      output+=`
        <tr>
          <td>${i+1}</td>
          <td>${t.team}</td>
          <td>${t.wins}</td>
          <td>${t.losses}</td>
          <td>${t.pct}</td>
          <td>${t.gb}</td>
        </tr>`;
    });

    document.getElementById("standingsData").innerHTML = `
      <table class="standings-table">
        <tr><th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr>
        ${output}
      </table>`;

  } catch(err){
    document.getElementById("gamesData").innerHTML =
      `<div class="error">Failed to load data</div>`;
  }
}

load();

</script>

</body>
</html>
