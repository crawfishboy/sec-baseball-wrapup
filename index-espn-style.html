<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="/favicon.ico" />

<title>SEC Baseball Weekly Wrap Up</title>

<style>
:root{
  --bg:#141a24;
  --panel:#1d2635;
  --panel-2:#232e40;
  --text:#e6edf3;
  --muted:#9fb3cc;
  --accent:#9cc9ff;
  --border:#2b3446;
}

/* ===== BASE ===== */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.5;
}

/* ===== STICKY HEADER ===== */
.sticky-header{
  position:sticky;
  top:0;
  z-index:1000;
  background:var(--panel);
  border-bottom:1px solid var(--border);
}

/* TITLE */
.header-title{
  text-align:center;
  padding:14px 10px 6px;
}

.header-title h1{
  margin:0;
  font-size:24px;
  letter-spacing:0.3px;
}

/* CONTROLS */
.header-controls{
  display:flex;
  justify-content:center;
  gap:10px;
  padding:8px 10px;
  flex-wrap:wrap;
}

.header-controls a{
  color:var(--accent);
  text-decoration:none;
  font-weight:600;
  font-size:13px;
}

.header-controls select{
  background:var(--panel-2);
  color:var(--text);
  border:1px solid var(--border);
  padding:6px;
  border-radius:6px;
}

/* NAV */
.section-nav{
  display:flex;
  justify-content:center;
  gap:8px;
  padding:10px;
  background:var(--panel-2);
  border-top:1px solid var(--border);
  flex-wrap:wrap;
}

.section-nav a{
  color:var(--muted);
  text-decoration:none;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
}

.section-nav a:hover{
  background:var(--border);
  color:var(--text);
}

/* ===== LAYOUT ===== */
.container{
  max-width:950px;
  margin:20px auto;
  padding:10px;
}

/* SECTION */
.section{
  background:var(--panel);
  padding:14px;
  margin-bottom:14px;
  border-radius:12px;
  border:1px solid var(--border);
}

h2{
  margin:0 0 10px;
  font-size:16px;
  color:var(--accent);
  font-weight:600;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
}

@media(max-width:800px){
  .grid{
    grid-template-columns:1fr;
  }
}

/* FEATURED */
.featured-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:800px){
  .featured-grid{
    grid-template-columns:1fr;
  }
}

.featured-card{
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:12px;
  text-align:center;
}

.featured-card .teams{
  font-weight:600;
}

.featured-card .meta{
  font-size:12px;
  color:var(--muted);
  margin-top:5px;
}

/* GAME / RESULT CARDS */
.game-card,
.result-card{
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:10px;
  padding:10px;
  margin:8px 0;
}

.game-card .teams,
.result-card{
  font-weight:600;
}

.game-card .meta{
  font-size:12px;
  color:var(--muted);
}

/* RESULT ACCENT */
.result-card{
  border-left:4px solid #4caf50;
}

/* STANDINGS */
.standings-table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.standings-table th,
.standings-table td{
  padding:8px;
  border:1px solid var(--border);
  text-align:center;
}

.standings-table th{
  background:var(--panel-2);
  color:var(--accent);
}

/* ERROR */
.error{
  color:#ff7b7b;
  font-weight:600;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
</head>

<body>

<div class="sticky-header">

  <div class="header-title">
    <h1>⚾ SEC Baseball Weekly Wrap Up</h1>
  </div>

  <div class="header-controls">
    <a href="?week=current">Current</a>

    <select onchange="location = this.value">
      <option value="">Past Weeks</option>
      <option value="?week=week1">Week 1</option>
      <option value="?week=week2">Week 2</option>
      <option value="?week=week3">Week 3</option>
      <option value="?week=week4">Week 4</option>
      <option value="?week=week5">Week 5</option>
    </select>
  </div>

  <div class="section-nav">
    <a href="#featured">Top</a>
    <a href="#games">Games</a>
    <a href="#results">Results</a>
    <a href="#next">Next</a>
    <a href="#standings">Standings</a>
  </div>

</div>

<div class="container">

  <div class="section" id="featured">
    <h2>🔥 Top Matchups</h2>
    <div id="featuredData" class="featured-grid"></div>
  </div>

  <div class="grid">

    <div class="section" id="games">
      <h2>This Week’s Games</h2>
      <div id="gamesData">Loading...</div>
    </div>

    <div class="section" id="results">
      <h2>Results</h2>
      <div id="resultsData">Loading...</div>
    </div>

  </div>

  <div class="grid">

    <div class="section" id="next">
      <h2>Next Week</h2>
      <div id="nextData">Loading...</div>
    </div>

    <div class="section" id="standings">
      <h2>Standings</h2>
      <div id="standingsData">Loading...</div>
    </div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const week = params.get("week") || "current";

const BASE =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEETS = {
  current: BASE + "&gid=0",
  week1: BASE + "&gid=749848866",
  week2: BASE + "&gid=761086323",
  week3: BASE + "&gid=752709309",
  week4: BASE + "&gid=476878133",
  week5: BASE + "&gid=10532734"
};

const SHEET_URL = SHEETS[week] || SHEETS["current"];

function render(list, type){
  return list.map(x => {
    if (x === "__BLANK__") return `<div style="height:8px;"></div>`;

    if(type === "results"){
      return `<div class="result-card">${x}</div>`;
    }

    return `
      <div class="game-card">
        <div class="teams">${x}</div>
        <div class="meta">Thu–Sun</div>
      </div>
    `;
  }).join("");
}

async function load(){
  try {
    const res = await fetch(SHEET_URL + "&cachebust=" + Date.now());
    const csvText = await res.text();

    const rows = Papa.parse(csvText.trim(), { skipEmptyLines:true }).data;

    let data = { games:[], results:[], next:[] };
    let standings = [];

    rows.forEach(r => {
      const section = (r[0] || "").toLowerCase();

      if(section === "standings"){
        if(r[1]){
          standings.push({
            team:r[1],
            wins:r[2],
            losses:r[3],
            pct:r[4],
            gb:r[5]
          });
        }
        return;
      }

      if(data[section]){
        const value = r.slice(1).join(" ").trim();
        data[section].push(value || "__BLANK__");
      }
    });

    const featured = data.games.slice(0,2);

    document.getElementById("featuredData").innerHTML =
      featured.map(g => `
        <div class="featured-card">
          <div class="teams">${g}</div>
          <div class="meta">Featured Game</div>
        </div>
      `).join("");

    document.getElementById("gamesData").innerHTML = render(data.games,"games");
    document.getElementById("resultsData").innerHTML = render(data.results,"results");
    document.getElementById("nextData").innerHTML = render(data.next,"next");

    standings.sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));

    let output="";
    standings.forEach((t,i)=>{
      output+=`
        <tr>
          <td>${i+1}</td>
          <td>${t.team}</td>
          <td>${t.wins}</td>
          <td>${t.losses}</td>
          <td>${t.pct}</td>
          <td>${t.gb}</td>
        </tr>`;
    });

    document.getElementById("standingsData").innerHTML = `
      <table class="standings-table">
        <tr>
          <th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th>
        </tr>
        ${output}
      </table>`;

  } catch(err){
    document.getElementById("gamesData").innerHTML =
      `<div class="error">Failed to load data</div>`;
  }
}

load();

</script>

</body>
</html>
