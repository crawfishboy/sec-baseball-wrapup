<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SEC Baseball Weekly Wrap Up</title>
<link rel="icon" href="/favicon.ico" />

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

html {
  scroll-behavior: smooth;
  scroll-padding-top: 120px;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f141c;
  color:#e6edf3;
}

/* ================= NAV ================= */
.section-nav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:22px;
  padding:10px 14px;
  background:#0c121d;
  border-bottom:1px solid #263143;
  position:sticky;
  top:0;
  z-index:999;
  flex-wrap:wrap;
}

.section-nav a{
  color:#9fb3cc;
  text-decoration:none;
  font-size:13px;
  padding:6px 2px;
  border-bottom:2px solid transparent;
  transition:all 0.2s ease;
}

.section-nav a:hover{
  color:#cfe3ff;
  border-bottom:2px solid #3b82f6;
}

.section-nav a.active{
  color:#cfe3ff;
  border-bottom:2px solid #3b82f6;
}

.nav-select{
  background:#101826;
  color:#fff;
  border:1px solid #263143;
  padding:6px 10px;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
}

/* ================= HERO ================= */
.hero{
  position:relative;
  height:260px;
  background:url('https://imgs.search.brave.com/hO_kKVjyICctIyWBwNPCZzV_uu9ArVWyMDB5vf3ufwM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90aHVt/YnMuZHJlYW1zdGlt/ZS5jb20vYi9jbG9z/ZXVwLXVwLWJhc2Vi/YWxsLXNpdHRpbmct/Z3Jhc3MtZmllbGQt/c3VubGlnaHQtYnJl/YWtpbmctdHJlZXMt/YmFzZWJhbGwtZ3Jh/c3MtZmllbGQtY2xv/c2V1cC1iYWxsLXNl/YW1zLTMxMjI0MjAx/MS5qcGc') center/cover no-repeat;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content{
  position:relative;
  z-index:2;
  padding:24px;
}

.hero-featured{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}

.hero-card{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;
  padding:10px;
}

/* ================= LAYOUT ================= */
.container{
  max-width:1100px;
  margin:0 auto;
  padding:14px;
}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:14px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
}

/* panels */
.panel-white{
  background:#fff;
  color:#111;
  border-radius:10px;
  padding:12px;
}

.panel-blue{
  background:#1f4e8c;
  color:#fff;
  border-radius:10px;
  padding:12px;
}

.title{
  font-size:13px;
  text-transform:uppercase;
  margin-bottom:10px;
  color:#9fb3cc;
}

.row{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid #eee;
}

/* table */
.table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.table th,
.table td{
  padding:8px;
  text-align:center;
}

.table th:nth-child(1),
.table td:nth-child(1),
.table th:nth-child(2),
.table td:nth-child(2){
  text-align:left;
}

.table th:nth-child(1),
.table td:nth-child(1){
  width:70px;
  white-space:nowrap;
}

.table tr:nth-child(even){
  background:rgba(0,0,0,0.03);
}

/* mobile-safe (no redesign) */
@media(max-width:768px){
  .section-nav a{font-size:12px;}
  .nav-select{font-size:12px;padding:5px 8px;}
  .hero-content h2{font-size:18px;}
  .hero-content p{font-size:12px;}
  .hero-featured{grid-template-columns:1fr;}
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h2>SEC Baseball Weekly Wrap Up</h2>
    <p>Scores • Results • Standings • Weekly Breakdown</p>
    <div class="hero-featured" id="featuredGames"></div>
  </div>
</div>

<!-- NAV -->
<nav class="section-nav">

  <a href="#games" data-section="games">This Week</a>
  <a href="#results" data-section="results">Results</a>
  <a href="#next" data-section="next">Next Week</a>
  <a href="#standings" data-section="standings">Standings</a>

  <select id="weekSelect" class="nav-select">
    <option value="current">Current</option>
    <option value="week1">Week 1</option>
    <option value="week2">Week 2</option>
    <option value="week3">Week 3</option>
    <option value="week4">Week 4</option>
    <option value="week5">Week 5</option>
  </select>

</nav>

<div class="container">

  <div class="grid">

    <div>
      <div class="panel-white" id="games">
        <div class="title">This Week’s Games</div>
        <div id="gamesData"></div>
      </div>

      <br>

      <div class="panel-white" id="results">
        <div class="title">Results</div>
        <div id="resultsData"></div>
      </div>

      <br>

      <div class="panel-white" id="next">
        <div class="title">Next Week</div>
        <div id="nextData"></div>
      </div>
    </div>

    <div>
      <div class="panel-blue" id="standings">
        <div class="title">Standings</div>
        <div id="standingsData"></div>
      </div>
    </div>

  </div>

</div>

<script>

/* ================= SHEETS ================= */
const BASE =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEETS = {
  current: BASE + "&gid=0",
  week1: BASE + "&gid=749848866",
  week2: BASE + "&gid=761086323",
  week3: BASE + "&gid=752709309",
  week4: BASE + "&gid=476878133",
  week5: BASE + "&gid=10532734"
};

let isLoading = false;

/* ================= LOAD WEEK ================= */
async function loadWeek(week, pushUrl = true){

  if(isLoading) return;
  isLoading = true;

  if(pushUrl){
    history.pushState({}, "", `?week=${week}`);
  }

  const url = (SHEETS[week] || SHEETS.current) + "&cache=" + Date.now();

  try{
    const res = await fetch(url);
    const csv = await res.text();
    const rows = Papa.parse(csv.trim()).data;

    let data = {games:[], results:[], next:[]};
    let standings = [];
    let featured = [];

    rows.forEach(r=>{
      const type = (r[0]||"").toLowerCase();

      if(type === "featured"){
        featured.push({ match:r[1], meta:r[2] });
        return;
      }

      if(type === "standings"){
        standings.push({
          team:r[1],
          wins:r[2],
          losses:r[3],
          pct:r[4],
          gb:r[5]
        });
        return;
      }

      if(data[type]){
        data[type].push(r.slice(1).join(" "));
      }
    });

    renderAll(data, standings, featured);

  } catch(err){
    console.error(err);
  }

  isLoading = false;
}

/* ================= RENDER ================= */
function renderAll(data, standings, featured){

  document.getElementById("featuredGames").innerHTML =
    featured.map(f=>`
      <div class="hero-card">
        <b>${f.match}</b>
        <div style="font-size:12px;color:#cfe3ff;">${f.meta}</div>
      </div>
    `).join("");

  document.getElementById("gamesData").innerHTML =
    data.games.map(r=>`<div class="row">${r}</div>`).join("");

  document.getElementById("resultsData").innerHTML =
    data.results.map(r=>`<div class="row">${r}</div>`).join("");

  document.getElementById("nextData").innerHTML =
    data.next.map(r=>`<div class="row">${r}</div>`).join("");

  /* ================= FINAL STANDINGS LOGIC ================= */
  standings.sort((a, b) => parseFloat(b.pct) - parseFloat(a.pct));

  const normalizePct = (v) => Number(v).toFixed(3);

  const pctCounts = {};
  for (const t of standings) {
    const key = normalizePct(t.pct);
    pctCounts[key] = (pctCounts[key] || 0) + 1;
  }

  let lastKey = null;
  let rank = 0;

  const ranked = standings.map((team) => {
    const pctKey = normalizePct(team.pct);

    if (pctKey !== lastKey) {
      rank++;
    }

    lastKey = pctKey;

    const isTie = pctCounts[pctKey] > 1;

    return {
      ...team,
      rank: isTie ? `${rank} (tie)` : rank
    };
  });

  document.getElementById("standingsData").innerHTML = `
    <table class="table">
      <tr><th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr>
      ${ranked.map(t=>`
        <tr>
          <td>${t.rank}</td>
          <td>${t.team}</td>
          <td>${t.wins}</td>
          <td>${t.losses}</td>
          <td>${t.pct}</td>
          <td>${t.gb}</td>
        </tr>
      `).join("")}
    </table>
  `;

}

/* ================= EVENTS ================= */
document.getElementById("weekSelect").addEventListener("change",(e)=>{
  loadWeek(e.target.value);
});

const sections = document.querySelectorAll("div[id]");
const navLinks = document.querySelectorAll(".section-nav a");

function setActive(id){
  navLinks.forEach(a=>{
    a.classList.toggle("active", a.dataset.section === id);
  });
}

const observer = new IntersectionObserver((entries)=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      setActive(entry.target.id);
    }
  });
}, { rootMargin:"-40% 0px -55% 0px", threshold:0.1 });

sections.forEach(s=>observer.observe(s));

/* ================= INIT ================= */
const params = new URLSearchParams(window.location.search);
const initialWeek = params.get("week") || "current";

document.getElementById("weekSelect").value = initialWeek;
loadWeek(initialWeek,false);

</script>

</body>
</html>
