<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SEC Baseball Weekly Wrap Up</title>
<link rel="icon" href="/favicon.ico" />

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

html {
  scroll-behavior: smooth;
  scroll-padding-top: 120px;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f141c;
  color:#e6edf3;
}

/* NAV */
.section-nav{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:22px;
  padding:10px;
  background:#0c121d;
  border-bottom:1px solid #263143;
  position:sticky;
  top:0;
  z-index:999;
  flex-wrap:wrap;
}

.section-nav a{
  color:#9fb3cc;
  text-decoration:none;
  font-size:13px;
  border-bottom:2px solid transparent;
}

.section-nav a:hover,
.section-nav a.active{
  color:#cfe3ff;
  border-bottom:2px solid #3b82f6;
}

.nav-select{
  background:#101826;
  color:#fff;
  border:1px solid #263143;
  padding:6px 10px;
  border-radius:6px;
}

/* STICKY STRIP */
#stickyStrip{
  position:sticky;
  top:48px;
  z-index:998;
  background:#0c121d;
  border-bottom:1px solid #263143;
  padding:8px 12px;
  font-size:12px;
  color:#cfe3ff;
  overflow-x:auto;
  white-space:nowrap;
}

/* HERO */
.hero{
  position:relative;
  height:260px;
  background:url('https://imgs.search.brave.com/hO_kKVjyICctIyWBwNPCZzV_uu9ArVWyMDB5vf3ufwM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90aHVt/YnMuZHJlYW1zdGlt/ZS5jb20vYi9jbG9z/ZXVwLXVwLWJhc2Vi/YWxsLXNpdHRpbmctZ3Jhc3MtZmllbGQt.jpg') center/cover no-repeat;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content{
  position:relative;
  z-index:2;
  padding:24px;
}

.hero-featured{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

.hero-card{
  background:rgba(255,255,255,0.12);
  border-radius:10px;
  padding:10px;
}

/* LAYOUT */
.container{max-width:1100px;margin:auto;padding:14px;}

.grid{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:14px;
}

@media(max-width:900px){
  .grid{grid-template-columns:1fr;}
  .hero-featured{grid-template-columns:1fr;}
}

/* PANELS */
.panel-white,.panel-blue{
  border-radius:10px;
  padding:12px;
  opacity:0;
  transform:translateY(8px);
  animation:fadeUp 0.25s ease forwards;
}

.panel-white{background:#fff;color:#111;}
.panel-blue{background:#1f4e8c;color:#fff;}

@keyframes fadeUp{
  to{opacity:1;transform:translateY(0);}
}

/* TABLE */
.table{width:100%;border-collapse:collapse;font-size:13px;}

.table th,.table td{padding:8px;text-align:center;}

.table th:nth-child(1),.table td:nth-child(1),
.table th:nth-child(2),.table td:nth-child(2){
  text-align:left;
}

.table tr:nth-child(even){
  background:rgba(0,0,0,0.03);
}

/* ESPN TIE GROUP */
.tie-group{
  background:rgba(59,130,246,0.08);
}

.tie-rank{
  font-weight:700;
  color:#1f4e8c;
}

</style>
</head>

<body>

<!-- NAV -->
<nav class="section-nav">
  <a href="#games" data-section="games">This Week</a>
  <a href="#results" data-section="results">Results</a>
  <a href="#next" data-section="next">Next Week</a>
  <a href="#standings" data-section="standings">Standings</a>

  <select id="weekSelect" class="nav-select">
    <option value="current">Current</option>
    <option value="week1">Week 1</option>
    <option value="week2">Week 2</option>
    <option value="week3">Week 3</option>
    <option value="week4">Week 4</option>
    <option value="week5">Week 5</option>
  </select>
</nav>

<!-- STICKY STRIP -->
<div id="stickyStrip"></div>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h2>SEC Baseball Weekly Wrap Up</h2>
    <div id="featuredGames" class="hero-featured"></div>
  </div>
</div>

<div class="container">
<div class="grid">

<div>
<div class="panel-white" id="games"><div id="gamesData"></div></div><br>
<div class="panel-white" id="results"><div id="resultsData"></div></div><br>
<div class="panel-white" id="next"><div id="nextData"></div></div>
</div>

<div>
<div class="panel-blue" id="standings"><div id="standingsData"></div></div>
</div>

</div>
</div>

<script>

/* DATA */
const BASE="https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEETS={
current:BASE+"&gid=0",
week1:BASE+"&gid=749848866",
week2:BASE+"&gid=761086323",
week3:BASE+"&gid=752709309",
week4:BASE+"&gid=476878133",
week5:BASE+"&gid=10532734"
};

/* LOAD */
async function loadWeek(week){
const res=await fetch((SHEETS[week]||SHEETS.current)+"&t="+Date.now());
const csv=await res.text();
const rows=Papa.parse(csv.trim()).data;

let data={games:[],results:[],next:[]},standings=[],featured=[];

rows.forEach(r=>{
const type=(r[0]||"").toLowerCase();
if(type==="featured") featured.push({match:r[1],meta:r[2]});
else if(type==="standings") standings.push({team:r[1],wins:r[2],losses:r[3],pct:r[4],gb:r[5]});
else if(data[type]) data[type].push(r.slice(1).join(" "));
});

renderAll(data,standings,featured);
}

/* RENDER */
function renderAll(data,standings,featured){

document.getElementById("featuredGames").innerHTML=
featured.map(f=>`<div class="hero-card"><b>${f.match}</b><div>${f.meta}</div></div>`).join("");

document.getElementById("gamesData").innerHTML=data.games.map(r=>`<div>${r}</div>`).join("");
document.getElementById("resultsData").innerHTML=data.results.map(r=>`<div>${r}</div>`).join("");
document.getElementById("nextData").innerHTML=data.next.map(r=>`<div>${r}</div>`).join("");

/* FINAL STANDINGS LOGIC */
standings.sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));

const norm=v=>Number(v).toFixed(3);
const counts={};
standings.forEach(t=>{const k=norm(t.pct);counts[k]=(counts[k]||0)+1});

let last=null,rank=0;

const ranked=standings.map(t=>{
const k=norm(t.pct);
if(k!==last) rank++;
last=k;
return {...t,rank:counts[k]>1?`${rank} (tie)`:rank};
});

/* GROUP VISUAL */
const grouped=ranked.map((t,i,a)=>{
const prev=a[i-1],next=a[i+1];
return {...t,tie:(prev&&prev.pct===t.pct)||(next&&next.pct===t.pct)};
});

/* TABLE */
document.getElementById("standingsData").innerHTML=`
<table class="table">
<tr><th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th></tr>
${grouped.map(t=>`
<tr class="${t.tie?'tie-group':''}">
<td class="${String(t.rank).includes('tie')?'tie-rank':''}">${t.rank}</td>
<td>${t.team}</td><td>${t.wins}</td><td>${t.losses}</td>
<td>${t.pct}</td><td>${t.gb}</td>
</tr>`).join("")}
</table>`;

/* STICKY STRIP */
const top4=ranked.slice(0,4);
document.getElementById("stickyStrip").innerHTML=
"Top 4: "+top4.map(t=>`${t.team} (${t.rank})`).join(" • ");

}

/* INIT */
const sel=document.getElementById("weekSelect");
sel.addEventListener("change",e=>loadWeek(e.target.value));
loadWeek("current");

</script>

</body>
</html>
