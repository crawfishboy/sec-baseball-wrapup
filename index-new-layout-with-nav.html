<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SEC Baseball Weekly Wrap Up</title>
<link rel="icon" href="/favicon.ico" />

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>

/* ================= BASE ================= */
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f141c;
  color:#e6edf3;
}

/* ================= LAYOUT ================= */
.container{
  max-width:1100px;
  margin:0 auto;
  padding:14px;
}

.panel-white{
  background:#fff;
  color:#111;
  border-radius:10px;
  padding:12px;
}

.panel-blue{
  background:#1f4e8c;
  color:#fff;
  border-radius:10px;
  padding:12px;
}

/* ================= HERO ================= */
.hero{
  position:relative;
  height:260px;
  background:url('https://imgs.search.brave.com/hO_kKVjyICctIyWBwNPCZzV_uu9ArVWyMDB5vf3ufwM/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly90aHVt/YnMuZHJlYW1zdGlt/ZS5jb20vYi9jbG9z/ZXVwLXVwLWJhc2Vi/YWxsLXNpdHRpbmctZ3Jh/c3MtZmllbGQt...') center/cover no-repeat;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content{
  position:relative;
  padding:24px;
  z-index:2;
}

/* ================= FEATURED ================= */
.hero-featured{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  margin-top:14px;
}

.hero-card{
  background:rgba(255,255,255,0.12);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:10px;
  padding:10px;
}

/* ================= TABLE BASE ================= */
.table{
  width:100%;
  border-collapse:collapse;
  font-size:13px;
}

.table th,
.table td{
  padding:8px;
  text-align:center;
}

/* LEFT ALIGN RK + TEAM */
.table th:nth-child(1),
.table td:nth-child(1),
.table th:nth-child(2),
.table td:nth-child(2){
  text-align:left;
}

/* RANK COLUMN LOCK */
.table th:nth-child(1),
.table td:nth-child(1){
  width:70px;
  min-width:70px;
  max-width:70px;
  padding-left:6px;
  white-space:nowrap;
}

/* TEAM COLUMN */
.table td:nth-child(2){
  padding-left:8px;
}

/* NUMERIC ALIGNMENT */
.table td:nth-child(n+3){
  font-variant-numeric: tabular-nums;
}

/* ================= LIVE STANDINGS ================= */

.table tr{
  transition: all 0.15s ease;
}

.table tr:nth-child(even){
  background:rgba(255,255,255,0.04);
}

/* hover glow */
.table tr:hover{
  background:rgba(31, 78, 140, 0.25);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
}

/* #1 SEED */
.table tr.first{
  background:rgba(0, 255, 136, 0.10);
  border-left:3px solid #00ff88;
  font-weight:700;
}

/* TOP 4 PLAYOFF ZONE */
.table tr.playoff{
  background:rgba(255, 215, 0, 0.08);
  border-left:3px solid gold;
}

/* CLINCHED BADGE */
.clinch{
  display:inline-block;
  font-size:11px;
  margin-left:6px;
  padding:2px 6px;
  border-radius:10px;
  background:#ff3b3b;
  color:#fff;
  font-weight:700;
}

</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
  <div class="hero-content">
    <h2>SEC Baseball Weekly Wrap Up</h2>
    <p>Scores • Results • Standings • Weekly Breakdown</p>

    <div class="hero-featured" id="featuredGames"></div>
  </div>
</div>

<div class="container">

  <div class="panel-white">
    <h3>Standings</h3>
    <div id="standingsData"></div>
  </div>

</div>

<script>

/* ================= SHEETS ================= */
const BASE =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vTJqWA6-51XcC3cm3u_x6lp-1HFr8MO8_qPenmFFbJ3ndqGhqVTUHEPGiJ7yM5lpRMLDXoc01tOqhpM/pub?output=csv";

const SHEET_URL = BASE + "&gid=0";

/* ================= LOAD ================= */
let standings = [];

async function load(){

  const res = await fetch(SHEET_URL + "&cache=" + Date.now());
  const csv = await res.text();
  const rows = Papa.parse(csv.trim()).data;

  standings = [];

  rows.forEach(r=>{
    if((r[0]||"").toLowerCase() === "standings"){
      standings.push({
        team:r[1],
        wins:r[2],
        losses:r[3],
        pct:r[4],
        gb:r[5]
      });
    }
  });

  renderStandings();
}

/* ================= RENDER ================= */
function renderStandings(){

  standings.sort((a,b)=>parseFloat(b.pct)-parseFloat(a.pct));

  let ranked = standings.map((t,i)=>({
    ...t,
    rank: i + 1,
    clinched: parseInt(t.wins) >= 10
  }));

  document.getElementById("standingsData").innerHTML = `
    <table class="table">
      <tr>
        <th>RK</th><th>TEAM</th><th>W</th><th>L</th><th>PCT</th><th>GB</th>
      </tr>

      ${ranked.map((t,i)=>{

        let rowClass = "";
        if(i === 0) rowClass = "first";
        else if(i < 4) rowClass = "playoff";

        return `
          <tr class="${rowClass}">
            <td>${t.rank}</td>
            <td>
              ${t.team}
              ${t.clinched ? `<span class="clinch">CLINCHED</span>` : ""}
            </td>
            <td>${t.wins}</td>
            <td>${t.losses}</td>
            <td>${t.pct}</td>
            <td>${t.gb}</td>
          </tr>
        `;
      }).join("")}
    </table>
  `;
}

load();

</script>

</body>
</html>
