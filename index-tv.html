<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>SEC Baseball Weekly Wrap Up</title>
<link rel="icon" href="/favicon.ico" />

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f141c;
  color:#e6edf3;
}

.section-nav{
  display:flex;
  justify-content:center;
  gap:20px;
  padding:10px;
  background:#0c121d;
  position:sticky;
  top:0;
}

.section-nav a{
  color:#9fb3cc;
  text-decoration:none;
  font-size:13px;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:14px;
}

.panel-white{
  background:#fff;
  color:#111;
  border-radius:10px;
  padding:12px;
  margin-bottom:14px;
}

.panel-blue{
  background:#1f4e8c;
  color:#fff;
  border-radius:10px;
  padding:12px;
}

.title{
  font-size:13px;
  text-transform:uppercase;
  margin-bottom:10px;
  color:#9fb3cc;
}

.row{
  display:flex;
  align-items:center;
  padding:8px 10px;
  border-bottom:1px solid #eee;
  font-size:13px;
}

.badge{
  background:#1f4e8c;
  color:#fff;
  padding:3px 8px;
  border-radius:999px;
  font-size:11px;
  font-weight:bold;
}

.date-header{
  margin:10px 0;
  font-weight:bold;
  background:#f3f4f6;
  padding:6px 10px;
  border-radius:6px;
}
</style>
</head>

<body>

<nav class="section-nav">
  <a href="#games">This Week</a>
  <a href="#tv">TV</a>
  <a href="#results">Results</a>
  <a href="#next">Next Week</a>
</nav>

<div class="container">

  <div class="panel-white" id="tv">
    <div class="title">TV Schedule</div>
    <div id="tvData"></div>
  </div>

</div>

<script>

const BASE = "YOUR_GOOGLE_SHEET_CSV_URL_HERE";

async function loadTV(){

  const res = await fetch(BASE + "&cache=" + Date.now());
  const csv = await res.text();
  const rows = Papa.parse(csv.trim()).data;

  let tv = [];

  rows.forEach(r=>{
    const type = (r[0]||"").toLowerCase();

    if(type === "tv"){
      tv.push({
        date: r[1],
        time: r[2],
        zone: r[3],
        game: r[4],
        network: r[5]
      });
    }
  });

  renderTV(tv);
}

function renderTV(tv){

  const parseDateTime = (d,t) => new Date(`${d} ${t}`);

  // SORT
  tv.sort((a,b)=> parseDateTime(a.date,a.time) - parseDateTime(b.date,b.time));

  // GROUP
  const grouped = {};
  tv.forEach(g=>{
    if(!grouped[g.date]) grouped[g.date] = [];
    grouped[g.date].push(g);
  });

  document.getElementById("tvData").innerHTML =
    Object.keys(grouped).map(date=>`

      <div class="date-header">${date}</div>

      ${grouped[date].map(g=>`
        <div class="row">

          <!-- TIME + ZONE (EXACTLY ONE SPACE) -->
          <div style="width:130px;">
            ${g.time} ${g.zone}
          </div>

          <!-- GAME -->
          <div style="flex:1;">
            ${g.game}
          </div>

          <!-- NETWORK -->
          <div style="width:120px;text-align:right;">
            <span class="badge">${g.network}</span>
          </div>

        </div>
      `).join("")}

    `).join("");
}

loadTV();

</script>

</body>
</html>
